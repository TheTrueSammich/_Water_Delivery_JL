<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slingshot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="globalResetBtn" type="button">Restart</button>
  <div id="mobileHud" aria-live="polite" aria-label="Game status">
    <div id="mobileHudStats">
      <div class="mobileHudItem">Water: <span id="mobileWaterCount">10</span></div>
      <div class="mobileHudItem">Points: <span id="mobilePointCount">0</span></div>
      <div class="mobileHudItem">Level: <span id="mobileLevelCount">1</span></div>
    </div>
    <div id="mobileNextLevelWrap" aria-label="Next level progress">
      <div id="mobileNextLevelText">10 points to next level</div>
      <div id="mobileNextLevelTrack">
        <div id="mobileNextLevelFill"></div>
      </div>
    </div>
    <button id="mobileResetBallBtn" type="button">Reset Ball</button>
  </div>
  <div id="mobileDropBall" aria-hidden="true">
    <img src="can.jpg" alt="" />
    <span id="mobileModifierBadge" aria-hidden="true"></span>
  </div>
  <div id="mobileMegaBouncy" aria-hidden="true">
    <div class="mobileMegaBouncyOrb">bouncy</div>
    <div class="mobileMegaBouncyOrb">bouncy</div>
    <div class="mobileMegaBouncyOrb">bouncy</div>
  </div>
  <div id="mobileBumpers" aria-hidden="true"></div>
  <div id="mobileBouncePads" aria-hidden="true">
    <div class="mobileBouncePad"></div>
    <div class="mobileBouncePad"></div>
    <div class="mobileBouncePad"></div>
  </div>
  <div id="mobilePipes" aria-hidden="true"><div id="mobilePipe1Label">Extra Water</div><div id="mobilePipe2Label">+5</div><div id="mobilePipe3Label">-3</div><div id="mobilePipe4Label">+3</div></div>
  <canvas id="gameCanvas"></canvas>
  <script src="script.js"></script>
</body>
</html>
